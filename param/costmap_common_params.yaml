robot_radius: 0.25
transform_tolerance: 0.1
map_type: costmap

obstacle_layer:
 enabled: true
 obstacle_range: 8.0
 raytrace_range: 9.0
 inflation_radius: 1.5
 track_unknown_space: false
 combination_method: 1

 observation_sources: laser_scan_sensor
 laser_scan_sensor: {data_type: LaserScan, topic: blueboat/scan, marking: true, clearing: true}


inflation_layer:
  enabled:              true
  cost_scaling_factor:  3  # exponential rate at which the obstacle cost drops off (default: 10)
  inflation_radius:     3   # max distance from an obstacle at which costs are incurred for planning paths.

static_layer:
  enabled:              true
  map_topic:            "map"
