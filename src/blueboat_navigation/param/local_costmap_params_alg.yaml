local_costmap:
  global_frame: odom
  robot_base_frame: blueboat/base_link
  footprint: [[0.60, 0.45], [0.60, -0.45], [-0.60, -0.45], [-0.60, 0.45]]
  footprint_padding: 0.1
  update_frequency: 10.0
  publish_frequency: 5.0
  static_map: false
  rolling_window: true
  width: 40
  height: 40
  resolution: 0.1
  transform_tolerance: 0.3
  
  plugins:
    - {name: voxel_layer, type: "costmap_2d::VoxelLayer"}
    - {name: inflation_layer, type: "costmap_2d::InflationLayer"}
  
  voxel_layer:
    enabled: true
    footprint_clearing_enabled: true
    max_obstacle_height: 2.0
    origin_z: 0.0
    z_resolution: 0.2
    z_voxels: 10
    publish_voxel_map: true
    
    # CRITICAL: Your point cloud topic from Fast_LIO or LiDAR
    observation_sources: lidar_scan
    lidar_scan: 
      data_type: PointCloud2
      topic: /cloud_registered          # Fast-LIO output topic
      marking: true
      clearing: true
      min_obstacle_height: 0.0
      max_obstacle_height: 8.0
      obstacle_range: 8.0
      raytrace_range: 9.0
      inf_is_valid: false
  
  inflation_layer:
    enabled: true
    cost_scaling_factor: 3.0
    inflation_radius: 0.5