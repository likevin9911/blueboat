robot_radius: 0.5
transform_tolerance: 1
map_type: costmap

voxel_layer:
  enabled: true
  obstacle_range: 8.0
  raytrace_range: 9.0
  track_unknown_space: false
  combination_method: 1
  max_obstacle_height: 2.0    # Adjust for your environment
  min_obstacle_height: 0.0
  observation_sources: lidar_scan
  lidar_scan: 
    data_type: PointCloud2
    topic: /cloud_registered          # Fast-LIO output topic
    marking: true
    clearing: true
    min_obstacle_height: 0.0
    max_obstacle_height: 2.0


inflation_layer:
  enabled:              true
  cost_scaling_factor:  1.5  # exponential rate at which the obstacle cost drops off (default: 10)
  inflation_radius:     3   # max distance from an obstacle at which costs are incurred for planning paths.

static_layer:
  enabled:              true
  map_topic:            "map"
